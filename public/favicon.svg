<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- 黑底红陀螺（按站点主题图重绘的矢量版） -->
  <rect width="128" height="128" rx="24" fill="#0a0a0c"/>
  <g transform="rotate(14 64 64)">
    <!-- 后方旋转弧 -->
    <path d="M18 62c-8 10 2 20 24 24" fill="none" stroke="#ff5a2b" stroke-width="5" stroke-linecap="round" opacity=".9"/>
    <path d="M112 52c6 12-4 22-26 26" fill="none" stroke="#e8342a" stroke-width="4" stroke-linecap="round" opacity=".75"/>
    <!-- 顶部把手 -->
    <rect x="56" y="14" width="16" height="18" rx="3" fill="#f03528"/>
    <!-- 层叠盘身 -->
    <ellipse cx="64" cy="36" rx="20" ry="7" fill="#e8342a"/>
    <ellipse cx="64" cy="44" rx="28" ry="9" fill="#ff4530"/>
    <!-- 菱形主体 -->
    <path d="M30 48 Q64 38 98 48 L64 112 Z" fill="#e8342a"/>
    <!-- 主体切面高光/暗面 -->
    <path d="M38 54 L64 60 L60 98 Z" fill="#ff4530"/>
    <path d="M92 54 L66 60 L64 74 Z" fill="#c92419"/>
    <!-- 中缝 -->
    <path d="M62 60 L66 60 L65 104 L63 104 Z" fill="#0a0a0c"/>
    <!-- 前方旋转弧（穿过锥体） -->
    <path d="M14 78c14 14 60 18 96 4" fill="none" stroke="#ff5a2b" stroke-width="6" stroke-linecap="round"/>
    <!-- 速度飞点 -->
    <circle cx="24" cy="42" r="3" fill="#ff5a2b"/>
    <circle cx="106" cy="88" r="3" fill="#e8342a"/>
    <path d="M100 24 l8 -5" stroke="#ff5a2b" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
