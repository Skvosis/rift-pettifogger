name: Update match data

on:
  schedule:
    # 每日 UTC 03:00（北京时间 11:00）：拉取当年 OE CSV，增量重建当年 JSON
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      year:
        description: "要更新的年份（留空 = 当年）"
        required: false

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Fetch current-year CSV from Oracle's Elixir
        run: |
          YEAR_ARG=""
          if [ -n "${{ inputs.year }}" ]; then YEAR_ARG="--year=${{ inputs.year }}"; fi
          npm run data:fetch -- $YEAR_ARG
      - name: Rebuild JSON for the year
        run: |
          YEAR="${{ inputs.year }}"
          if [ -z "$YEAR" ]; then YEAR=$(date -u +%Y); fi
          npm run data:build -- --years=$YEAR
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --staged --quiet; then
            echo "数据无变化，跳过提交"
          else
            git commit -m "chore(data): 自动更新比赛数据 $(date -u +%Y-%m-%d)"
            # 抓取期间 main 可能有新提交，rebase 后再推送
            git pull --rebase origin main
            git push
          fi
