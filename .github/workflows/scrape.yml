name: Scrape Leaguepedia data

on:
  schedule:
    # 每日 UTC 03:00（北京时间 11:00）增量更新当年数据
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      full:
        description: "全量重建（2013 至今）而非仅当年增量"
        type: boolean
        default: false
      from:
        description: "起始年份（留空则 full=2013 / 增量=当年）"
        required: false
      to:
        description: "截止年份（留空则当年）"
        required: false

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run scraper
        run: |
          ARGS=""
          if [ "${{ inputs.full }}" = "true" ]; then ARGS="$ARGS --full"; fi
          if [ -n "${{ inputs.from }}" ]; then ARGS="$ARGS --from=${{ inputs.from }}"; fi
          if [ -n "${{ inputs.to }}" ]; then ARGS="$ARGS --to=${{ inputs.to }}"; fi
          echo "scrape args: $ARGS"
          npm run scrape -- $ARGS
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --staged --quiet; then
            echo "数据无变化，跳过提交"
          else
            git commit -m "chore(data): 自动更新比赛数据 $(date -u +%Y-%m-%d)"
            # 抓取期间 main 可能有新提交，rebase 后再推送
            git pull --rebase origin main
            git push
          fi
