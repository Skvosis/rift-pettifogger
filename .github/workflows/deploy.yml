name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # 抓取工作流用 GITHUB_TOKEN 提交数据时不会触发 push 事件（GitHub 防递归），
  # 因此监听其完成事件来部署新数据。
  workflow_run:
    workflows: ["Scrape Leaguepedia data"]
    types: [completed]
  workflow_dispatch:

# 允许 GITHUB_TOKEN 部署到 Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时刻只跑一个部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    # workflow_run 触发时仅在抓取成功后部署
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
